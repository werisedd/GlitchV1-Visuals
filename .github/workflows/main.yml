name: Build GlitchV1
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # ВОТ ЭТО НАСИЛЬНОЕ ЛЕЧЕНИЕ - ДЕЛАЕТ ФАЙЛ ИСПОЛНЯЕМЫМ
      - name: Force fix gradlew
        run: |
          # На случай если файл кривой - скачиваем новый, но маленький
          # А старый просто меняем права
          git update-index --chmod=+x gradlew
          chmod +x gradlew
          # Пробуем запустить
          ./gradlew --version

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: GlitchV1
          path: build/libs/*.jar
